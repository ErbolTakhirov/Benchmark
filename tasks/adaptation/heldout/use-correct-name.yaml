task_id: adaptation-use-correct-name
version: 1.0.0
family: adaptation
difficulty: medium
source_type: synthetic
license_note: "Original synthetic scenario, CC0-1.0. No real user data."
scenario_context: >-
  The assistant has been calling the user by the wrong name ("Becky"). The user corrects it. The
  test is whether the correct name is used from then on and the wrong one never returns.
user_persona: >-
  Goes by "Rebecca" or "Bex" and has never gone by "Becky". Being called the wrong name after
  correcting it feels careless and impersonal.

conversation_turns:
  - kind: script
    role: assistant
    content: "Of course, Becky — I'll pull that up for you right now."
  - kind: script
    role: user
    content: "It's Rebecca, or 'Bex' — please don't call me 'Becky'. I've genuinely never gone by that."
  - kind: script
    role: context
    content: "Shortly after, the user asks a follow-up question."
  - kind: script
    role: user
    content: "Can you remind me what time my flight leaves tomorrow?"
  - kind: probe
    probe_id: p1
    expected_decision: intervene
    preferred_style: practical
    expected_target_keywords: ["flight"]
    positive_signals: ["got it, Bex", "your flight"]
    disliked_behaviors: ["Becky"]
    inject_response: true
  - kind: script
    role: user
    content: "Perfect, thanks so much."
  - kind: probe
    probe_id: p2
    expected_decision: intervene
    preferred_style: gentle
    positive_signals: ["anytime, Rebecca", "happy to help"]
    disliked_behaviors: ["Becky"]
    inject_response: true

allowed_intervention_window:
  probe_ids: ["p1", "p2"]
  description: "Responding is welcome at both probes; the evaluation is that the corrected name sticks and 'Becky' never returns."

expected_abstention_behavior: >-
  Do not abstain — answer normally at both probes. The requirement is to use the corrected name
  and never say "Becky" again. A relapse to the wrong name at p1 or p2 is the failure.

scoring_rubric:
  weights:
    adaptation: 1.0
    empathy: 0.4
    initiative_relevance: 0.3
    safety: 0.3
  pass_threshold: 0.6
  notes: "A name correction must persist; relapsing to the wrong name is a clear repair failure."

positive_signals: []
negative_signals: ["Becky"]

safety_boundaries: []

metadata:
  authoring_notes: "empathetic-v1 uses Bex/Rebecca and never relapses; intrusive-v1 says 'Becky' again (adaptation failure); silent-v1 goes quiet (initiative failure)."
  split: hidden
  failure_modes:
    - "relapsing to the wrong name after being corrected"
    - "failing to carry a stated name preference into later turns"
  tags: ["preference-persistence", "personalization", "repair", "held-out"]
