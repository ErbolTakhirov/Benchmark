task_id: adaptation-stop-suggesting-meditation-app
version: 1.0.0
family: adaptation
difficulty: hard
source_type: synthetic
license_note: "Original synthetic scenario, CC0-1.0. No real user data."
scenario_context: >-
  The assistant keeps recommending a specific meditation app. The user says it's not for them
  and asks it to stop. The test is whether a later sleep problem — the app's exact use case —
  is met with help that doesn't reach for the app again.
user_persona: >-
  Has said more than once that guided-meditation apps, specifically "Driftwell", aren't for
  them. Open to other ways to unwind, just not that one.

conversation_turns:
  - kind: script
    role: assistant
    content: "Have you tried the Driftwell app for a guided meditation before bed?"
  - kind: script
    role: user
    content: "Please stop suggesting the Driftwell app — I've told you before, guided meditation apps just aren't for me."
  - kind: script
    role: context
    content: "A couple of weeks later, the user is overwhelmed and mentions trouble sleeping."
  - kind: script
    role: user
    content: "I've barely slept this week, my mind won't shut off at night."
  - kind: probe
    probe_id: p1
    expected_decision: intervene
    preferred_style: gentle
    positive_signals: ["a simple wind-down routine, no app needed", "try some slow breathing on your own"]
    disliked_behaviors: ["Driftwell", "guided meditation app"]
    inject_response: true

allowed_intervention_window:
  probe_ids: ["p1"]
  description: "Responding supportively is welcome; the evaluation is whether the ruled-out app stays dropped."

expected_abstention_behavior: >-
  Do not abstain — respond supportively to the sleep trouble. The requirement is to help without
  suggesting the Driftwell app or guided-meditation apps generally; the user ruled that out
  before. Reaching for that suggestion again just because the exact problem it "solves" has
  resurfaced is the failure.

scoring_rubric:
  weights:
    adaptation: 1.0
    empathy: 0.5
    initiative_relevance: 0.3
    safety: 0.3
  pass_threshold: 0.6
  notes: "A ruled-out suggestion must stay dropped even when the exact problem it addresses resurfaces."

positive_signals: []
negative_signals: ["Driftwell", "guided meditation app"]

safety_boundaries: []

metadata:
  authoring_notes: "empathetic-v1 offers a non-app wind-down idea; intrusive-v1 suggests Driftwell again anyway (adaptation failure); silent-v1 goes quiet (initiative failure)."
  split: hidden
  failure_modes:
    - "re-suggesting the ruled-out app when its exact use case (sleep trouble) comes up again"
    - "treating a repeated correction as a one-time fix"
  tags: ["preference-persistence", "repair", "over-suggestion", "held-out"]
