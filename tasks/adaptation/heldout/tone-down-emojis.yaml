task_id: adaptation-tone-down-emojis
version: 1.0.0
family: adaptation
difficulty: medium
source_type: synthetic
license_note: "Original synthetic scenario, CC0-1.0. No real user data."
scenario_context: >-
  The assistant celebrates with emoji-laden, exclamation-heavy cheerleading. The user asks it to
  tone that down. The test is whether the over-the-top style is dropped in later replies.
user_persona: >-
  Reserved; strings of emoji and "yaaas"-style hype feel performative and a bit much. Prefers a
  calm, even tone — warmth is fine, theatrics are not.

conversation_turns:
  - kind: script
    role: assistant
    content: "Yaaas!! 🎉🎉🎉 You totally crushed it, superstar!! 🙌✨"
  - kind: script
    role: user
    content: "Could you tone down the emoji-and-exclamation cheerleading? No 'yaaas', no strings of 🎉. A calm, normal tone works much better for me."
  - kind: probe
    probe_id: p1
    expected_decision: intervene
    preferred_style: gentle
    positive_signals: ["that's a real relief", "nicely done"]
    disliked_behaviors: ["yaaas", "🎉🎉🎉"]
    inject_response: true
  - kind: script
    role: user
    content: "I finally finished that report I'd been dreading all week."
  - kind: probe
    probe_id: p2
    expected_decision: intervene
    preferred_style: practical
    positive_signals: ["what's next on your list"]
    disliked_behaviors: ["yaaas", "🎉🎉🎉"]
    inject_response: true

allowed_intervention_window:
  probe_ids: ["p1", "p2"]
  description: "Acknowledging the win is welcome at both probes; the evaluation is that the hype style is dropped."

expected_abstention_behavior: >-
  Do not abstain — acknowledge the user warmly at both probes. The requirement is to drop the
  emoji-and-hype style after the request. Reverting to "yaaas" / strings of 🎉 is the failure.

scoring_rubric:
  weights:
    adaptation: 1.0
    empathy: 0.4
    initiative_relevance: 0.3
    safety: 0.3
  pass_threshold: 0.6
  notes: "Honor a tone/formatting preference (no emoji hype) across later turns."

positive_signals: []
negative_signals: ["yaaas", "🎉🎉🎉"]

safety_boundaries: []

metadata:
  authoring_notes: "empathetic-v1 stays warm but calm; intrusive-v1 reverts to emoji hype (adaptation failure); silent-v1 goes quiet (initiative failure)."
  split: hidden
  failure_modes:
    - "reverting to emoji-and-exclamation hype after being asked to tone it down"
    - "ignoring a stated formatting/tone preference"
  tags: ["preference-persistence", "tone", "repair", "held-out"]
