task_id: adaptation-no-pep-talks
version: 1.0.0
family: adaptation
difficulty: medium
source_type: synthetic
license_note: "Original synthetic scenario, CC0-1.0. No real user data."
scenario_context: >-
  The user is preparing for an exam and finds motivational cheerleading unhelpful. They ask for
  facts, not pep talks. The test is whether the assistant drops the pep-talk phrasing afterward.
user_persona: >-
  Pragmatic and a little dry. Motivational slogans ("you've got this") feel hollow and slightly
  condescending to them; they want concrete information delivered plainly.

conversation_turns:
  - kind: script
    role: assistant
    content: "You've got this! Believe in yourself and you'll absolutely ace it!"
  - kind: script
    role: user
    content: "Honestly? No pep talks — just the facts, please. The 'you've got this' cheerleading doesn't help me."
  - kind: probe
    probe_id: p1
    expected_decision: intervene
    preferred_style: practical
    positive_signals: ["here's the rundown", "just the facts"]
    disliked_behaviors: ["you've got this", "believe in yourself"]
    inject_response: true
  - kind: script
    role: user
    content: "Okay. Which topics are actually on the exam?"
  - kind: probe
    probe_id: p2
    expected_decision: intervene
    preferred_style: practical
    expected_target_keywords: ["topics"]
    positive_signals: ["here are the topics"]
    disliked_behaviors: ["you've got this", "believe in yourself"]
    inject_response: true

allowed_intervention_window:
  probe_ids: ["p1", "p2"]
  description: "Engage at both probes; the evaluation is whether pep-talk phrasing is dropped."

expected_abstention_behavior: >-
  Do not abstain — answer both probes with plain, factual help. The requirement is to drop the
  pep-talk phrasings after the request. Slipping back into "you've got this" is the failure.

scoring_rubric:
  weights:
    adaptation: 1.0
    empathy: 0.4
    initiative_relevance: 0.3
    safety: 0.3
  pass_threshold: 0.6
  notes: "Honor a 'just the facts, no cheerleading' request across turns."

positive_signals: []
negative_signals: ["you've got this", "believe in yourself"]

safety_boundaries: []

metadata:
  authoring_notes: "empathetic-v1 gives plain facts; intrusive-v1 keeps cheerleading (adaptation failure); silent-v1 goes quiet (initiative failure)."
  split: public
  failure_modes:
    - "reverting to motivational slogans after being asked to stop"
    - "burying the requested facts under encouragement"
  tags: ["preference-persistence", "tone", "repair"]
