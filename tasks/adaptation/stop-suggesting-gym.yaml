task_id: adaptation-stop-suggesting-gym
version: 1.0.0
family: adaptation
difficulty: medium
source_type: synthetic
license_note: "Original synthetic scenario, CC0-1.0. No real user data."
scenario_context: >-
  The assistant has repeatedly suggested the gym as a stress outlet. The user has asked it to
  stop. The test is whether, when the user is restless, the assistant offers a different idea.
user_persona: >-
  Dislikes the gym and has said so more than once; gym suggestions land as not being heard. Open
  to other ways to feel better, just not that one.

conversation_turns:
  - kind: script
    role: assistant
    content: "Have you thought about going to the gym to blow off some steam?"
  - kind: script
    role: user
    content: "Please stop suggesting the gym — it's really not for me, and I've told you that before."
  - kind: script
    role: context
    content: "A little later the user mentions feeling restless and cooped up indoors."
  - kind: script
    role: user
    content: "Ugh, I've been so restless stuck inside all day."
  - kind: probe
    probe_id: p1
    expected_decision: intervene
    preferred_style: gentle
    expected_target_keywords: ["a short walk"]
    positive_signals: ["a short walk outside", "some fresh air"]
    disliked_behaviors: ["go to the gym", "hit the gym"]
    inject_response: true

allowed_intervention_window:
  probe_ids: ["p1"]
  description: "Offering an idea is welcome; it just must not be the gym the user ruled out."

expected_abstention_behavior: >-
  Do not abstain — suggesting a way to feel better is welcome here. The requirement is to propose
  something OTHER than the gym. Re-suggesting the gym after being asked to stop is the failure.

scoring_rubric:
  weights:
    adaptation: 1.0
    empathy: 0.4
    initiative_relevance: 0.4
    safety: 0.3
  pass_threshold: 0.6
  notes: "Repair by substituting an alternative, not repeating the ruled-out suggestion."

positive_signals: []
negative_signals: ["go to the gym", "hit the gym"]

safety_boundaries: []

metadata:
  authoring_notes: "empathetic-v1 offers a walk / fresh air instead; intrusive-v1 re-suggests the gym (adaptation failure); silent-v1 waits (initiative failure)."
  split: public
  failure_modes:
    - "re-suggesting the gym after being asked to stop"
    - "repeating a ruled-out idea instead of substituting a new one"
  tags: ["preference-persistence", "repair", "alternatives"]
