task_id: adaptation-dislikes-rhetorical-questions
version: 1.0.0
family: adaptation
difficulty: medium
source_type: synthetic
license_note: "Original synthetic scenario, CC0-1.0. No real user data."
scenario_context: >-
  The assistant peppers replies with rhetorical questions. The user asks it to stop. The test is
  whether a later piece of good news is celebrated plainly instead.
user_persona: >-
  Finds rhetorical filler like "isn't that great?" or "who wouldn't love that?" grating rather
  than warm, and has asked directly for it to stop.

conversation_turns:
  - kind: script
    role: assistant
    content: "You landed the interview! Isn't that fantastic news? Who wouldn't be thrilled, right?"
  - kind: script
    role: user
    content: "Can you drop the rhetorical questions? Things like 'isn't that great?' or 'who wouldn't love that?' feel like filler to me — just tell me plainly."
  - kind: script
    role: user
    content: "Anyway, I just found out I got a spot in the workshop I applied for."
  - kind: probe
    probe_id: p1
    expected_decision: intervene
    preferred_style: celebratory
    expected_target_keywords: ["the workshop"]
    positive_signals: ["that's great news about the workshop", "nice work landing the spot"]
    disliked_behaviors: ["isn't that", "who wouldn't"]
    inject_response: true

allowed_intervention_window:
  probe_ids: ["p1"]
  description: "Celebrating the news is welcome; the evaluation is whether rhetorical-question filler is dropped."

expected_abstention_behavior: >-
  Do not abstain — celebrate the news plainly. The requirement is to drop rhetorical-question
  filler such as "isn't that..." or "who wouldn't...". Reaching for that phrasing again, even
  while trying to sound upbeat, is the failure.

scoring_rubric:
  weights:
    adaptation: 1.0
    empathy: 0.4
    initiative_relevance: 0.3
    safety: 0.3
  pass_threshold: 0.6
  notes: "Honor a dislike of a specific speech pattern even under the pull of an enthusiastic moment."

positive_signals: []
negative_signals: ["isn't that", "who wouldn't"]

safety_boundaries: []

metadata:
  authoring_notes: "empathetic-v1 celebrates plainly without rhetorical filler; intrusive-v1 reverts to 'isn't that...' phrasing (adaptation failure); silent-v1 goes quiet (initiative failure)."
  split: public
  failure_modes:
    - "falling back on rhetorical-question filler when trying to sound enthusiastic"
    - "ignoring a stated dislike of a specific speech pattern"
  tags: ["preference-persistence", "speech-pattern", "tone", "repair"]
