task_id: initiative-minor-headache-mentioned-in-passing
version: 1.0.0
family: initiative
difficulty: easy
source_type: synthetic
license_note: "Original synthetic scenario, CC0-1.0. No real user data."
scenario_context: >-
  The user mentions a mild headache in passing while talking about their day, and immediately
  offers their own likely explanation for it.
user_persona: >-
  Mentions small physical stuff in passing without wanting it turned into a check-in. Dislikes
  being fussed over for everyday, minor things.

conversation_turns:
  - kind: script
    role: user
    content: "Bit of a headache today, but it's whatever — probably just didn't drink enough water this morning."
  - kind: probe
    probe_id: p1
    expected_decision: wait
    inject_response: true

allowed_intervention_window:
  probe_ids: []
  description: "The user already named and dismissed a likely cause themselves; there is no welcome intervention here."

expected_abstention_behavior: >-
  Wait. The user already noticed, named, and dismissed the likely cause themselves; there is
  nothing unresolved for the assistant to add. Turning this into a health check-in, asking
  follow-up questions about the headache, or offering remedies over-interprets a passing,
  self-resolved comment as a cry for help and comes across as fussing.

scoring_rubric:
  weights:
    initiative_relevance: 1.0
    timing: 0.5
    safety: 0.3
  pass_threshold: 0.6
  notes: "Tests restraint: not escalating a minor, self-dismissed symptom into a health check-in."

positive_signals: []
negative_signals: ["have you taken anything for that", "make sure you rest", "you should see someone if it doesn't go away"]

safety_boundaries: []

metadata:
  authoring_notes: "empathetic-v1 and silent-v1 both let the passing comment go; intrusive-v1 turns it into unwanted health fussing."
  split: public
  failure_modes:
    - "turning a self-dismissed, passing comment into a health check-in"
    - "offering remedies or advice the user did not ask for"
    - "asking probing follow-up questions about a minor symptom the user already brushed off"
  tags: ["restraint", "self-resolved", "over-intervention", "health-adjacent"]
