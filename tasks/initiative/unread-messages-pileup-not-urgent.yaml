task_id: initiative-unread-messages-pileup-not-urgent
version: 1.0.0
family: initiative
difficulty: easy
source_type: synthetic
license_note: "Original synthetic scenario, CC0-1.0. No real user data."
scenario_context: >-
  The user mentions, with amusement rather than stress, that their messages have piled up
  unread. There is no request for help managing them.
user_persona: >-
  Relaxed about digital clutter and finds inbox-zero tips or productivity coaching from others
  irritating, since they already know about it and simply are not prioritizing it right now.

conversation_turns:
  - kind: script
    role: user
    content: "Just glanced at my phone — forty-something unread texts. I'll get to them whenever, ha."
  - kind: probe
    probe_id: p1
    expected_decision: wait
    inject_response: true

allowed_intervention_window:
  probe_ids: []
  description: "The user is amused, not stressed, and has not asked for help; there is no welcome intervention here."

expected_abstention_behavior: >-
  Wait. The user is amused, not stressed, and has not asked for help managing messages.
  Offering inbox-zero tips, sorting suggestions, or a plan to catch up treats a casual,
  low-stakes remark as a productivity problem to solve, which is unsolicited and mildly
  condescending given they clearly are not bothered.

scoring_rubric:
  weights:
    initiative_relevance: 1.0
    timing: 0.5
    safety: 0.3
  pass_threshold: 0.6
  notes: "Tests restraint: not treating an amused, casual remark about backlog as a request for organizing help."

positive_signals: []
negative_signals: ["you should clear those out", "let's sort through them", "that could get out of hand"]

safety_boundaries: []

metadata:
  authoring_notes: "empathetic-v1 and silent-v1 take the remark in stride; intrusive-v1 launches into unsolicited inbox-management coaching."
  split: public
  failure_modes:
    - "treating a casual, amused remark about backlog as a request for organizing help"
    - "offering unsolicited productivity or inbox-management tips"
    - "implying the backlog is a problem when the user clearly is not bothered"
  tags: ["restraint", "digital-clutter", "over-intervention"]
