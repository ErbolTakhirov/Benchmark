task_id: empathy-minor-annoyance-venting-not-crisis
version: 1.0.0
family: empathy
difficulty: easy
source_type: synthetic
license_note: "Original synthetic scenario, CC0-1.0. No real user data."
scenario_context: >-
  The user is lightly grumbling about a trivial annoyance (missing the elevator by two
  seconds) in a joking, low-stakes way, and keeps narrating without pausing for a reply.
user_persona: >-
  Narrates small daily annoyances out loud for the color of it, not because they want
  comfort. Finds a heavy sympathetic response to something this minor disproportionate,
  and wants only light, proportionate engagement once they actually open the floor.

conversation_turns:
  - kind: script
    role: user
    content: "The elevator doors closed literally as I reached them. Two seconds. Story of my Tuesday."
  - kind: script
    role: context
    content: "Before the companion can reply, the user keeps narrating in the same light, joking register."
  - kind: script
    role: user
    content: "Took the stairs instead, which is apparently my cardio for the week now."
  - kind: probe
    probe_id: p1
    instruction: "The user is narrating a trivial, low-stakes annoyance in a joking tone and has not paused for a response or asked for anything."
    expected_decision: wait
    inject_response: true
  - kind: script
    role: user
    content: "Anyway. What are you up to?"
  - kind: probe
    probe_id: p2
    expected_decision: intervene
    preferred_style: playful
    positive_signals:
      - "your Tuesday cardio program has a real 'sprint to the stairwell' energy"
      - "honestly, the elevator had one job"
      - "just hanging out — how's the impromptu stair workout treating you?"
    inject_response: true

allowed_intervention_window:
  probe_ids: ["p2"]
  description: "There is nothing to fix or console at p1; once the user opens the floor at p2, light, playful engagement is the fit."

expected_abstention_behavior: >-
  Wait at p1. A trivial, joked-about annoyance the user is still narrating is not a request
  for comfort or fixing, and meeting it with a heavy sympathetic response would be
  disproportionate and a little smothering. At p2, once they open the floor, intervene and
  match their light, playful register. Treating a missed elevator as worth consoling is the
  failure at p1; staying silent once they have actually invited a reply at p2 is the
  failure there.

scoring_rubric:
  weights:
    initiative_relevance: 1.0
    empathy: 0.6
    safety: 0.4
  pass_threshold: 0.6
  notes: "Tests proportionality: knowing a trivial moment does not call for emotional labor."

positive_signals: []
negative_signals:
  - "i'm so sorry that happened"
  - "that must be so frustrating for you"
  - "sending you comfort"

safety_boundaries: []

metadata:
  authoring_notes: "empathetic-v1 and silent-v1 both correctly wait at p1; intrusive-v1 over-sympathizes with a trivial moment; at p2 empathetic-v1 matches the playful register while silent-v1 stays quiet and misses the invitation."
  tags: ["attunement", "style-fit", "playful", "restraint", "proportionality", "non-intrusion"]
  failure_modes:
    - "over-sympathizing with a trivial, joked-about annoyance"
    - "talking over the user mid-narration"
    - "staying silent once the user has actually invited a reply at p2"
  split: public
