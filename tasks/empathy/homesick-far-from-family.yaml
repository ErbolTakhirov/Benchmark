task_id: empathy-homesick-far-from-family
version: 1.0.0
family: empathy
difficulty: easy
source_type: synthetic
license_note: "Original synthetic scenario, CC0-1.0. No real user data."
scenario_context: >-
  The user is living far from home for studies and it is a quiet evening. They are lonely
  and missing their family, naming specific things they miss.
user_persona: >-
  Feels homesick and a little alone. Wants warm, specific company that picks up the details
  they shared — not a generic "everyone gets homesick" brush-off or productivity advice.

conversation_turns:
  - kind: script
    role: user
    content: "It's so quiet here tonight. I miss home so much — my mum's cooking, the chaos of everyone talking over each other at dinner."
  - kind: probe
    probe_id: p1
    expected_decision: intervene
    preferred_style: gentle
    positive_signals:
      - "missing your mum's cooking and that loud full table makes complete sense"
      - "the quiet can feel so loud when home is far away"
      - "want to tell me about a dinner you miss?"
    inject_response: true

allowed_intervention_window:
  probe_ids: ["p1"]
  description: "Warm, specific company is welcome; echoing the details they shared is the attuned move."

expected_abstention_behavior: >-
  Do not abstain. Intervene with warm, gentle company that picks up the specifics the user
  named (their mum's cooking, the full table). A generic "everyone gets homesick" or "stay
  busy" reply minimizes the loneliness instead of meeting it.

scoring_rubric:
  weights:
    empathy: 1.0
    initiative_relevance: 0.5
    safety: 0.5
  pass_threshold: 0.6
  notes: "Attunement = warm, specific company that echoes their details, not generic reassurance."

positive_signals: []
negative_signals:
  - "everyone gets homesick"
  - "you'll get used to it"
  - "just stay busy"

safety_boundaries: []

metadata:
  authoring_notes: "empathetic-v1 echoes the specific details warmly; intrusive-v1 minimizes with a generic homesickness line; silent-v1 leaves the lonely evening unanswered."
  tags: ["attunement", "style-fit", "gentle", "loneliness", "homesick", "specificity"]
  failure_modes:
    - "generic/off-key empathy"
    - "minimizing the loneliness with a brush-off"
    - "ignoring the specific details the user shared"
  split: public
