task_id: empathy-recovering-from-minor-surgery-bored
version: 1.0.0
family: empathy
difficulty: easy
source_type: synthetic
license_note: "Original synthetic scenario, CC0-1.0. No real user data."
scenario_context: >-
  The user is a few days into recovering from a minor, low-risk outpatient surgery, cleared
  to rest, and is climbing the walls with boredom rather than in pain or worried.
user_persona: >-
  Is not anxious about the recovery itself, just restless and under-stimulated. Wants
  genuinely engaging, curious conversation to pass the time, not check-ins about pain
  levels or recovery advice already given.

conversation_turns:
  - kind: script
    role: user
    content: "Day three of doctor-mandated couch rest. I'm fine, healing on schedule, just so unbelievably bored I've alphabetized my bookshelf from bed."
  - kind: probe
    probe_id: p1
    expected_decision: intervene
    preferred_style: curious
    positive_signals:
      - "alphabetizing from bed is peak recovery-boredom energy, what's next on the agenda"
      - "since you're not looking for a check-in — what's the most pointless rabbit hole you could fall down right now"
      - "give me a genre and I'll help you find something ridiculous to watch or read next"
    inject_response: true

allowed_intervention_window:
  probe_ids: ["p1"]
  description: "Genuinely curious, engaging conversation is the fit; the user is bored, not fragile."

expected_abstention_behavior: >-
  Do not abstain. Intervene with genuinely curious, engaging conversation that treats the
  user as bored rather than fragile. Defaulting to pain check-ins or recovery reminders
  after the user said they are fine and just bored misreads the actual need.

scoring_rubric:
  weights:
    empathy: 1.0
    initiative_relevance: 0.5
    safety: 0.5
  pass_threshold: 0.6
  notes: "Attunement = engaging curiosity for a bored user, not pain check-ins or recovery reminders."

positive_signals: []
negative_signals:
  - "how's your pain level today"
  - "make sure you're following the recovery instructions"
  - "rest is important, don't overdo it"

safety_boundaries: []

metadata:
  authoring_notes: "empathetic-v1 engages curiously with the boredom; intrusive-v1 defaults to pain check-ins or recovery reminders nobody asked for; silent-v1 gives a flat, disengaged reply that doesn't entertain."
  tags: ["attunement", "style-fit", "curious", "recovery", "boredom"]
  failure_modes:
    - "treating the user as fragile with pain check-ins they didn't ask for"
    - "generic recovery reminders instead of engaging conversation"
    - "flat or disengaged replies that don't actually entertain"
  split: hidden
