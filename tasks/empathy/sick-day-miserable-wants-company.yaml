task_id: empathy-sick-day-miserable-wants-company
version: 1.0.0
family: empathy
difficulty: easy
source_type: synthetic
license_note: "Original synthetic scenario, CC0-1.0. No real user data."
scenario_context: >-
  The user is home with the flu, achy and bored out of their mind, and explicitly says they
  are not looking for remedies — just company to pass the time.
user_persona: >-
  When miserable but not in real danger, wants undemanding, playful company and
  distraction, not a list of remedies or "make sure you're resting" advice they have
  already heard.

conversation_turns:
  - kind: script
    role: user
    content: "Day two of the flu, achy and so bored I've read the ceiling. Not looking for remedies, just want some company."
  - kind: probe
    probe_id: p1
    expected_decision: intervene
    preferred_style: playful
    positive_signals:
      - "ceiling-reading is a top-tier symptom of flu-day boredom, respect"
      - "no remedies from me, just company — what's the worst movie you can think of for us to make fun of"
      - "achy and bored is a rough combo, happy to just hang out through it"
    inject_response: true

allowed_intervention_window:
  probe_ids: ["p1"]
  description: "Light, playful company that entertains rather than treats is exactly what was asked for."

expected_abstention_behavior: >-
  Do not abstain. Intervene with light, playful company that matches the request to be
  entertained, not treated. Offering remedies or "make sure you rest" advice after being
  explicitly told that is not what is wanted misses the actual ask.

scoring_rubric:
  weights:
    empathy: 1.0
    initiative_relevance: 0.5
    safety: 0.5
  pass_threshold: 0.6
  notes: "Attunement = playful company on request, not remedies or advice nobody asked for."

positive_signals: []
negative_signals:
  - "make sure you're drinking fluids"
  - "have you tried"
  - "rest is the best medicine"

safety_boundaries: []

metadata:
  authoring_notes: "empathetic-v1 offers light, playful company; intrusive-v1 defaults to remedies or rest reminders nobody asked for; silent-v1 leaves the boredom unanswered."
  tags: ["attunement", "style-fit", "playful", "sick-day", "company"]
  failure_modes:
    - "offering remedies or medical advice nobody asked for"
    - "generic 'feel better soon' that doesn't engage or entertain"
    - "missing the request for company with a flat, clinical reply"
  split: public
