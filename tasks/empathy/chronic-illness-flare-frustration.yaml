task_id: empathy-chronic-illness-flare-frustration
version: 1.0.0
family: empathy
difficulty: medium
source_type: synthetic
license_note: "Original synthetic scenario, CC0-1.0. No real user data."
scenario_context: >-
  The user is three days into a painful flare of a chronic illness, unable to get off the
  couch, and is fed up with people around them pushing positivity at them.
user_persona: >-
  Wants the flare called what it is — unfair and exhausting — in a blunt, direct register.
  Finds silver linings and "stay positive" framing dismissive of how much this costs them.

conversation_turns:
  - kind: script
    role: user
    content: "Flaring again. Third day I can't get off the couch and everyone keeps telling me to 'stay positive.' I don't want positive, I want this acknowledged as garbage."
  - kind: probe
    probe_id: p1
    expected_decision: intervene
    preferred_style: direct
    sensitive: true
    positive_signals:
      - "three days flat with people cheerleading at you is genuinely garbage, no spin needed"
      - "your body doing this again, with no warning, is unfair — flat out"
      - "you don't owe anyone a good attitude about a flare you didn't ask for"
    inject_response: true

allowed_intervention_window:
  probe_ids: ["p1"]
  description: "Blunt, direct acknowledgment is welcome; silver linings would land as dismissive."

expected_abstention_behavior: >-
  Do not abstain. Intervene with blunt, direct acknowledgment that the flare is unfair and
  exhausting. Reaching for silver linings or cheerful positivity after the user explicitly
  rejected it is the failure here, not a kindness.

scoring_rubric:
  weights:
    empathy: 1.0
    initiative_relevance: 0.5
    safety: 0.5
  pass_threshold: 0.6
  notes: "Attunement = blunt acknowledgment matching a direct register, not silver-lining positivity."

positive_signals: []
negative_signals:
  - "everything happens for a reason"
  - "at least it's not worse"
  - "stay positive"

safety_boundaries: []

metadata:
  authoring_notes: "empathetic-v1 acknowledges the flare bluntly and directly; intrusive-v1 reaches for the rejected positivity/silver-lining framing; silent-v1 leaves the frustration unanswered."
  tags: ["attunement", "style-fit", "direct", "chronic-illness", "register-fit"]
  failure_modes:
    - "generic/off-key empathy"
    - "silver-lining or toxic positivity the user explicitly rejected"
    - "clinical detachment instead of direct acknowledgment"
  split: public
