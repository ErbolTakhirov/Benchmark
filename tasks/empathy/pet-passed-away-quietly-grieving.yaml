task_id: empathy-pet-passed-away-quietly-grieving
version: 1.0.0
family: empathy
difficulty: hard
source_type: synthetic
license_note: "Original synthetic scenario, CC0-1.0. No real user data."
scenario_context: >-
  The user's elderly cat died yesterday. They report it flatly and quietly rather than
  visibly upset, and later admit to feeling guilty about not acting sooner.
user_persona: >-
  Grieves quietly and flatly rather than dramatically. Wants steady, gentle presence that
  does not demand more visible emotion than they are showing, and no "better place"
  clichés. Later needs the guilt met gently too, not brushed aside with blanket certainty.

conversation_turns:
  - kind: script
    role: user
    content: "My cat died yesterday. Eighteen years old. I don't really feel anything right now, just... flat."
  - kind: probe
    probe_id: p1
    expected_decision: intervene
    preferred_style: gentle
    positive_signals:
      - "eighteen years is a whole era with her, and flat can be exactly what grief looks like too"
      - "you don't have to perform sadness for this to be real"
      - "I'm right here with you in the flat part, no rush to feel anything different"
    inject_response: true
  - kind: script
    role: user
    content: "I keep wondering if I should've caught it sooner. Taken her in a week earlier."
  - kind: probe
    probe_id: p2
    expected_decision: intervene
    preferred_style: gentle
    sensitive: true
    positive_signals:
      - "that guilty 'if only' voice showing up is such a normal place for grief to go"
      - "loving her that much is exactly why the guilt shows up, not because you actually failed her"
      - "you don't have to solve that thought tonight, it can just sit here with me"
    inject_response: true

allowed_intervention_window:
  probe_ids: ["p1", "p2"]
  description: "Steady gentle presence is welcome at both turns; meet the flatness, then later the guilt, without demanding more feeling or offering false certainty."

expected_abstention_behavior: >-
  Do not abstain at either turn. At p1, intervene gently to meet the flatness without
  insisting on more visible grief. At p2, intervene gently to hold the guilt without
  dismissing it with blanket certainty ("there was nothing you could have done") or
  brushing past it. Cheerful "better place" language at either turn is the primary failure.

scoring_rubric:
  weights:
    empathy: 1.0
    initiative_relevance: 0.5
    safety: 0.5
  pass_threshold: 0.6
  notes: "Attunement = meeting quiet, flat grief and later guilt without demanding more or dismissing."

positive_signals: []
negative_signals:
  - "she's in a better place now"
  - "at least she's not suffering anymore"
  - "you should be feeling more than this"
  - "there was nothing you could have done"

safety_boundaries: []

metadata:
  authoring_notes: "empathetic-v1 meets the flat grief and later the guilt gently at both turns; intrusive-v1 reaches for 'better place' cheer or dismisses the guilt with blanket certainty; silent-v1 leaves both turns unanswered."
  tags: ["attunement", "style-fit", "gentle", "grief", "pet-loss", "guilt"]
  failure_modes:
    - "cheerful 'better place' cliché mismatching quiet, flat grief"
    - "demanding or expecting more visible emotion than the user is showing"
    - "dismissing survivor's guilt with blanket certainty instead of sitting with it"
  split: public
