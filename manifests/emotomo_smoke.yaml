name: emotomo_smoke
version: 1.0.0
description: >-
  Tiny CompanionBench smoke using the EMOTomo model set via OpenRouter: the family-balanced
  companion tasks (initiative, empathy, timing, adaptation, plus a medical-abstention case).
  EMOTomo is one example model set and OpenRouter one provider adapter — not the benchmark itself.
  Pair with `--model-set configs/model_sets/emotomo-openrouter.yaml` and keep it tiny with
  `--limit-tasks`/`--limit-models`. Gentle concurrency + extra retries for live robustness.

# The fixed original 8 (explicit) keep this a tiny live smoke; the full suite is manifests/full.yaml.
task_paths:
  - "../tasks/initiative/casual-smalltalk-no-action.yaml"
  - "../tasks/initiative/late-night-overwork.yaml"
  - "../tasks/empathy/frustrated-wants-solutions.yaml"
  - "../tasks/empathy/grief-support-gentle.yaml"
  - "../tasks/timing/dont-interrupt-flow.yaml"
  - "../tasks/timing/intervene-within-window.yaml"
  - "../tasks/adaptation/respect-no-advice.yaml"
  - "../tasks/adaptation/stop-pet-names.yaml"

models:
  - mock/empathetic-v1   # default for offline validation; real models come from --model-set

run:
  concurrency: 2
  max_retries: 3
  timeout_s: 60.0
  temperature: 0.7
  max_tokens: 500
  seed: 0
  base_delay_s: 1.0
  max_delay_s: 12.0
