name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy

      - name: Tests (pytest)
        run: uv run pytest -q

      - name: Validate smoke manifest
        run: uv run companion-bench validate manifests/smoke.yaml

      - name: Providers + model-set validation (offline)
        run: |
          uv run companion-bench providers
          uv run companion-bench models validate --model-set configs/model_sets/example.yaml

      - name: Run smoke benchmark (mock, offline)
        run: uv run companion-bench run --manifest manifests/smoke.yaml --model mock/empathetic-v1 --out runs/smoke

      - name: Score smoke benchmark
        run: uv run companion-bench score --run runs/smoke

      - name: Export smoke benchmark (parquet)
        run: uv run companion-bench export --run runs/smoke --format parquet
